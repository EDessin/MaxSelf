services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: maxself
      POSTGRES_PASSWORD: maxself
      POSTGRES_DB: maxself
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maxself -d maxself"]
      interval: 5s
      timeout: 5s
      retries: 12

  identity:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: identity
    environment:
      PORT: 8081
      DATABASE_URL: postgres://maxself:maxself@postgres:5432/maxself?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      FRONTEND_URL: http://localhost:4201
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:8081/auth/google/callback}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  activity:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: activity
    environment:
      PORT: 8082
      DATABASE_URL: postgres://maxself:maxself@postgres:5432/maxself?sslmode=disable
      FRONTEND_URL: http://localhost:4201
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

  progress:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: progress
    environment:
      PORT: 8083
      DATABASE_URL: postgres://maxself:maxself@postgres:5432/maxself?sslmode=disable
      FRONTEND_URL: http://localhost:4201
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: api
    environment:
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      FRONTEND_URL: http://localhost:4201
      IDENTITY_SERVICE_URL: http://identity:8081
      ACTIVITY_SERVICE_URL: http://activity:8082
      PROGRESS_SERVICE_URL: http://progress:8083
      DATABASE_URL: postgres://maxself:maxself@postgres:5432/maxself?sslmode=disable
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_HEALTH_REDIRECT_URL: ${GOOGLE_HEALTH_REDIRECT_URL:-http://localhost:8080/api/integrations/google-health/callback}
    ports:
      - "8080:8080"
    depends_on:
      - identity
      - activity
      - progress

  web:
    restart: unless-stopped
    build:
      context: ./web
    ports:
      - "4201:80"
    depends_on:
      - api

volumes:
  postgres-data:
